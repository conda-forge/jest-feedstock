context:
  version: "30.0.3"

package:
  name: jest
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/jest/-/jest-${{ version }}.tgz
  sha256: a2a7bfe5ce2b5dbcd26df9796e6686f88fc16ead9a41a6eb4ecdaecc9c51cf41

build:
  number: 0
  noarch: generic

requirements:
  build:
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs

tests:
  - script:
      - jest --help

about:
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: Delightful JavaScript Testing.
  homepage: https://github.com/jestjs/jest
  repository: https://github.com/jestjs/jest

extra:
  recipe-maintainers:
    - danielnachun
