context:
  version: "30.0.2"

package:
  name: jest
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/jest/-/jest-${{ version }}.tgz
  sha256: b7d341c8a8a87bd047e3078af496acfc55e524d184ce8a0558b352141b02fa26

build:
  number: 0
  noarch: generic

requirements:
  build:
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs

tests:
  - script:
      - jest --help

about:
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: Delightful JavaScript Testing.
  homepage: https://github.com/jestjs/jest
  repository: https://github.com/jestjs/jest

extra:
  recipe-maintainers:
    - danielnachun
